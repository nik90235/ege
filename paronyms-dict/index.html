const alphabetNav = document.getElementById('alphabetNav');
const dictionaryList = document.getElementById('dictionaryList');
const searchInput = document.getElementById('searchInput');

function renderDictionary() {
    paronymsData.forEach(section => {
        const btn = document.createElement('button');
        btn.className = 'letter-btn';
        btn.textContent = section.letter;
        btn.onclick = () => {
            const el = document.getElementById(`letter-${section.letter}`);
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        };
        alphabetNav.appendChild(btn);
    });

    paronymsData.forEach(section => {
        const sec = document.createElement('div');
        sec.className = 'letter-section';
        sec.id = `letter-${section.letter}`;

        const h2 = document.createElement('h2');
        h2.className = 'section-letter';
        h2.textContent = section.letter;
        sec.appendChild(h2);

        const grid = document.createElement('div');
        grid.className = 'grid';

        section.pairs.forEach(pair => {
            const group = document.createElement('div');
            group.className = 'paronym-group';
            
            const header = document.createElement('div');
            header.className = 'paronym-header';
            
            const name = document.createElement('div');
            name.className = 'card-name';
            name.textContent = pair.title;
            
            const arrow = document.createElement('span');
            arrow.className = 'arrow-icon';
            arrow.textContent = '▼';
            
            header.appendChild(name);
            header.appendChild(arrow);
            group.appendChild(header);

            const content = document.createElement('div');
            content.className = 'paronym-content';
            
            content.onclick = (e) => e.stopPropagation();

            pair.words.forEach(word => {
                const item = document.createElement('div');
                item.className = 'paronym-item';
                item.innerHTML = `
                    <div class="word-title-block">${word.name}</div>
                    <div class="word-def">${word.def}</div>
                    <div class="word-example">${word.exp}</div>
                `;
                content.appendChild(item);
            });

            group.appendChild(content);
            
            group.onclick = () => {
                const isActive = group.classList.contains('active');
                if (isActive) {
                    content.style.display = 'none';
                    group.classList.remove('active');
                } else {
                    content.style.display = 'block';
                    group.classList.add('active');
                }
            };

            grid.appendChild(group);
        });

        sec.appendChild(grid);
        dictionaryList.appendChild(sec);
    });
}

searchInput.addEventListener('input', function(e) {
    const query = e.target.value.toLowerCase().trim();
    const sections = document.querySelectorAll('.letter-section');

    sections.forEach(section => {
        const groups = section.querySelectorAll('.paronym-group');
        let visibleGroups = 0;

        groups.forEach(group => {
            const headerText = group.querySelector('.card-name').textContent.toLowerCase();
            const contentText = group.querySelector('.paronym-content').textContent.toLowerCase();
            
            if (headerText.includes(query) || contentText.includes(query)) {
                group.style.display = 'flex';
                visibleGroups++;
                
                if (query.length > 1) {
                    group.querySelector('.paronym-content').style.display = 'block';
                    group.classList.add('active');
                }
            } else {
                group.style.display = 'none';
                group.querySelector('.paronym-content').style.display = 'none';
                group.classList.remove('active');
            }
        });

        section.style.display = (visibleGroups === 0) ? 'none' : 'block';
    });
});

renderDictionary();
</script>
</body>
</html>
